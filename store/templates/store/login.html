<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ເຂົ້າສູ່ລະບົບ | Procom POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Lao', sans-serif; 
            background-color: #f0f2f5; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-btn { border-radius: 8px; font-weight: bold; }
        .form-control { border-radius: 8px; padding: 12px 15px; }
    </style>
</head>
<body>

<div class="card login-card p-4">
    <div class="text-center mb-4">
        {% if shop and shop.logo %}
            <img src="{{ shop.logo.url }}" alt="Logo" style="height: 80px; width: 80px; object-fit: cover; border-radius: 15px;" class="mb-3 shadow-sm">
        {% else %}
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 80px; height: 80px;">
                <i class="bi bi-laptop fs-1"></i>
            </div>
        {% endif %}
        <h3 class="fw-bold">{{ shop.shop_name|default:"PROCOM POS" }}</h3>
        <p class="text-muted">ກະລຸນາເຂົ້າສູ່ລະບົບເພື່ອໃຊ້ງານ</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} py-2 text-center" style="border-radius: 8px;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">ຊື່ຜູ້ໃຊ້ (Username)</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control border-start-0" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">ລະຫັດຜ່ານ (Password)</label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control border-start-0" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 login-btn fs-5">
            ເຂົ້າສູ່ລະບົບ
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
