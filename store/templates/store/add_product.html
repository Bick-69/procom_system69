{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-4 d-flex justify-content-center">
    <div class="card shadow p-4" style="width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold text-success mb-0"><i class="bi bi-box-seam"></i> ເພີ່ມສິນຄ້າໃໝ່ (Add Product)</h3>
            <a href="{% url 'product_list' %}" class="btn btn-outline-secondary btn-sm">ກັບຄືນໜ້າລາຍການ</a>
        </div>
        <hr>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="fw-bold">ລະຫັດສິນຄ້າ (ID):</label>
                    <input type="text" name="pro_id" class="form-control" required placeholder="ເຊັ່ນ: P001">
                </div>
                <div class="col-md-8">
                    <label class="fw-bold">ຊື່ສິນຄ້າ (Product Name):</label>
                    <input type="text" name="pro_name" class="form-control" required placeholder="ເຊັ່ນ: Mouse Logitech G102">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="fw-bold">ລາຄາຕົ້ນທຶນ (ຊື້):</label>
                    <input type="number" step="0.01" name="price_buy" class="form-control" required min="0">
                </div>
                <div class="col-md-4">
                    <label class="fw-bold">ລາຄາຂາຍ (ຂາຍ):</label>
                    <input type="number" step="0.01" name="price_sale" class="form-control" required min="0">
                </div>
                <div class="col-md-4">
                    <label class="fw-bold">ຈຳນວນເລີ່ມຕົ້ນ:</label>
                    <input type="number" name="qty" class="form-control" value="0" min="0" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="fw-bold">ໝວດໝູ່ (Category):</label>
                    <select name="cat_id" class="form-select" required>
                        <option value="">-- ເລືອກໝວດໝູ່ --</option>
                        {% for c in categories %}
                            <option value="{{ c.cat_id }}">{{ c.cat_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="fw-bold">ຍີ່ຫໍ້ (Brand):</label>
                    <select name="brand_id" class="form-select" required>
                        <option value="">-- ເລືອກຍີ່ຫໍ້ --</option>
                        {% for b in brands %}
                            <option value="{{ b.brand_id }}">{{ b.brand_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="fw-bold">ຫົວໜ່ວຍ (Unit):</label>
                    <select name="unit_id" class="form-select" required>
                        <option value="">-- ເລືອກຫົວໜ່ວຍ --</option>
                        {% for u in units %}
                            <option value="{{ u.unit_id }}">{{ u.unit_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 fs-5 rounded-pill shadow-sm">
                <i class="bi bi-save"></i> ບັນທຶກຂໍ້ມູນສິນຄ້າ
            </button>
        </form>
    </div>
</div>
{% endblock %}
