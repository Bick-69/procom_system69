{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-4 d-flex justify-content-center">
    <div class="card shadow p-4" style="width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold text-danger mb-0"><i class="bi bi-tools"></i> ຮັບເຄມສິນຄ້າ (Add Claim)</h3>
            <a href="{% url 'claim_list' %}" class="btn btn-outline-secondary btn-sm">ກັບຄືນໜ້າລາຍການ</a>
        </div>
        <hr>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="fw-bold">ເລືອກລາຍການຂາຍທີ່ຕ້ອງການເຄມ (Select Sold Item):</label>
                <select name="sale_detail_id" class="form-select" required>
                    <option value="">-- ເລືອກບິນຂາຍ / ສິນຄ້າ --</option>
                    {% for item in recent_sales %}
                        <option value="{{ item.id }}">
                            ບິນ: {{ item.sale.sale_id }} | 
                            ສິນຄ້າ: {{ item.pro.pro_name }} | 
                            ລູກຄ້າ: {% if item.sale.cus %}{{ item.sale.cus.cus_name }}{% else %}ທົ່ວໄປ{% endif %} |
                            ວັນທີ: {{ item.sale.sale_date|date:"d/m/Y" }}
                        </option>
                    {% endfor %}
                </select>
                <div class="form-text text-muted">ສະແດງລາຍການຂາຍ 50 ລາຍການລ່າສຸດ</div>
            </div>

            <div class="mb-4">
                <label class="fw-bold">ອາການເພ່ເພ / ບັນຫາ (Symptom / Problem):</label>
                <textarea name="symptom" class="form-control" rows="4" placeholder="ອະທິບາຍອາການທີ່ລູກຄ້າແຈ້ງມາກ່ຽວກັບສິນຄ້າ..." required></textarea>
            </div>

            <button type="submit" class="btn btn-danger w-100 fs-5">
                <i class="bi bi-save"></i> ບັນທຶກການເຄມສິນຄ້າ
            </button>
        </form>
    </div>
</div>
{% endblock %}
