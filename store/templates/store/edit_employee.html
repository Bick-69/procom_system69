{% extends "store/base.html" %}

{% block title %}ແກ້ໄຂຂໍ້ມູນພະນັກງານ - Procom POS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0" style="border-radius: 20px;">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex align-items-center mb-4">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3 text-white" 
                         style="width: 50px; height: 50px; background-color: #4318ff;">
                        <i class="bi bi-person-gear fs-4"></i>
                    </div>
                    <div>
                        <h4 class="mb-0 fw-bold" style="color: #2b3674;">ແກ້ໄຂຂໍ້ມູນພະນັກງານ</h4>
                        <small class="text-muted">ID: {{ employee.emp_id }}</small>
                    </div>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="color: #a3aed1;">ຊື່ພະນັກງານ</label>
                            {{ form.emp_name }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="color: #a3aed1;">ນາມສະກຸນ</label>
                            {{ form.surname }}
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" style="color: #a3aed1;">ເບີໂທລະສັບ</label>
                            {{ form.tel }}
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" style="color: #a3aed1;">ຕຳແໜ່ງ</label>
                            {{ form.position }}
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" style="color: #a3aed1;">ລະຫັດຜ່ານ (Password)</label>
                            {{ form.password }}
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-5">
                        <a href="{% url 'employee_list' %}" class="btn btn-light w-100 py-3" style="color: #a3aed1; border-radius: 15px;">
                            ຍົກເລີກ
                        </a>
                        <button type="submit" class="btn btn-primary w-100 py-3" style="box-shadow: 0 4px 15px rgba(67, 24, 255, 0.3); border-radius: 15px;">
                            <i class="bi bi-check-circle-fill me-2"></i> ບັນທຶກການແກ້ໄຂ
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
