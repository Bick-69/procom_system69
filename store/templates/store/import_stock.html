{% extends 'store/base.html' %}
{% block content %}
<div class="container mt-2 d-flex justify-content-center">
    <div class="card p-4 p-md-5 w-100 shadow-sm" style="max-width: 650px; border-radius: 20px;">
        
        <div class="text-center mb-4 pb-3" style="border-bottom: 2px solid #f4f7fe;">
            <div class="rounded-circle d-inline-flex justify-content-center align-items-center mb-3" style="width: 70px; height: 70px; background: rgba(5, 205, 153, 0.1); color: #05cd99;">
                <i class="bi bi-box-arrow-in-down" style="font-size: 2.5rem;"></i>
            </div>
            <h4 class="fw-bold mb-1" style="color: #2b3674;">ຮັບເຂົ້າສິນຄ້າ (Import Stock)</h4>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="fw-bold mb-2">ຜູ້ສະໜອງ (Supplier) <span class="text-danger">*</span></label>
                <select name="sup_id" class="form-select form-select-lg" required>
                    <option value="">-- ເລືອກຜູ້ສະໜອງ --</option>
                    {% for s in suppliers %}
                        <option value="{{ s.sup_id }}">{{ s.company_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="fw-bold mb-2">ເລືອກສິນຄ້າ (Product) <span class="text-danger">*</span></label>
                <select name="pro_id" class="form-select form-select-lg" required>
                    <option value="">-- ເລືອກສິນຄ້າ --</option>
                    {% for p in products %}
                        <option value="{{ p.pro_id }}">{{ p.pro_name }} (ຄັງ: {{ p.qty }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label class="fw-bold mb-2">ຈຳນວນ <span class="text-danger">*</span></label>
                    <input type="number" name="qty" class="form-control form-control-lg fw-bold" placeholder="0" min="1" required style="color: #05cd99;">
                </div>
                <div class="col-6">
                    <label class="fw-bold mb-2">ຕົ້ນທຶນ/ໜ່ວຍ (ກີບ) <span class="text-danger">*</span></label>
                    <input type="number" name="price" class="form-control form-control-lg fw-bold" placeholder="0" min="0" required>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-3 fw-bold fs-5" style="border-radius: 15px; background-color: #05cd99; border-color: #05cd99;">
                <i class="bi bi-check2-circle me-2"></i> ຢືນຢັນການຮັບເຂົ້າ
            </button>
        </form>
    </div>
</div>
{% endblock %}
